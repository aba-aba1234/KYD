kind = "web"
previewPath = "/"
title = "KYD — Keep Your Dear ones safe"
version = "1.0.0"
id = "artifacts/kyd"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25104

[services.development]
run = "pnpm --filter @workspace/kyd run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kyd", "run", "build" ]
publicDir = "artifacts/kyd/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25104"
BASE_PATH = "/"
